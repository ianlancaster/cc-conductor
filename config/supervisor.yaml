supervisor:
  heartbeatIntervalSeconds: 30
  stallThresholdMinutes: 5
  stallRestartAttempts: 1
  defaultMaxTurns: 100
  logLevel: debug
  usageSessionThreshold: 80
  usageWeeklyThreshold: 70

intelligence:
  stallJudgeModel: claude-haiku-4-5-20251001

# Auto-responses for Claude Code prompts that block agents.
# These are bare number/string responses sent without any prefix.
# Set to null to escalate to the operator instead of auto-responding.
autoResponses:
  memoryPrompts: 1          # "Memory updated" → 1 (Yes)
  permissionPrompts: 1      # Permission requests → 1 (Yes)
  unknownNumbered: null     # Unrecognized numbered prompts → escalate

localModel:
  provider: ollama
  model: qwen3:8b
  endpoint: http://localhost:11434
  idleTimeoutMinutes: 10
  confidenceThreshold: 0.7

telegram:
  escalationExpiryHours: 24
  escalationDefaultAction: deny

database:
  path: ./data/conductor.db

claudeCode:
  binary: claude
  defaultModel: claude-opus-4-6

transport:
  default: desktop

iterm:
  windowName: Agent Conductor
  autoPauseOnFocus: false
  autoPauseResumeDelaySeconds: 60

mcp:
  port: 3456
